<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SGU Ticketing</title>

<!-- =======================================================
====================== GOOGLE FONT ========================
======================================================= -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

/* =======================================================
====================== ROOT START ========================
======================================================= */
:root{
    --primary:#071739;
    --secondary:#0f3460;
    --gold:#ffd369;
    --white:#ffffff;
    --light:#f6f8fc;
    --glass:rgba(255,255,255,0.12);
    --border:rgba(255,255,255,0.18);
}
/* =======================================================
======================= ROOT END =========================
======================================================= */


/* =======================================================
===================== GLOBAL START =======================
======================================================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    overflow-x:hidden;

    background:
    radial-gradient(circle at top left,#123d91 0%,transparent 25%),
    radial-gradient(circle at bottom right,#0f3460 0%,transparent 30%),
    linear-gradient(135deg,#030b1d,#071739,#0f3460);

    color:white;
    position:relative;
}

/* خلفية متحركة */
body::before{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background:rgba(255,211,105,0.12);
    border-radius:50%;
    top:-200px;
    left:-200px;
    filter:blur(120px);
    animation:move1 10s infinite alternate;
}

body::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:rgba(15,52,96,0.5);
    border-radius:50%;
    bottom:-180px;
    right:-180px;
    filter:blur(120px);
    animation:move2 12s infinite alternate;
}

@keyframes move1{
    from{transform:translate(0,0);}
    to{transform:translate(100px,60px);}
}

@keyframes move2{
    from{transform:translate(0,0);}
    to{transform:translate(-80px,-50px);}
}
/* =======================================================
====================== GLOBAL END ========================
======================================================= */

/* =======================================================
====================== MAIN START ========================
======================================================= */
.main-section{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:
    170px 20px
    140px;
}
/* =======================================================
======================= MAIN END =========================
======================================================= */


/* =======================================================
=================== LOGIN CARD START =====================
======================================================= */
.login-card{

    width:100%;
    max-width:470px;

    position:relative;

    padding:50px 40px;

    border-radius:35px;

    backdrop-filter:blur(22px);

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 10px 40px rgba(0,0,0,0.35),
    inset 0 0 20px rgba(255,255,255,0.05);

    overflow:hidden;

    animation:cardAnimation 1s ease;
}

/* Glow */
.login-card::before{
    content:"";
    position:absolute;
    width:220px;
    height:220px;
    background:rgba(255,211,105,0.18);
    border-radius:50%;
    top:-80px;
    left:-80px;
    filter:blur(60px);
}

.login-card::after{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    background:rgba(15,52,96,0.4);
    border-radius:50%;
    bottom:-60px;
    right:-60px;
    filter:blur(50px);
}

@keyframes cardAnimation{
    from{
        opacity:0;
        transform:translateY(50px) scale(.95);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}
/* =======================================================
==================== LOGIN CARD END ======================
======================================================= */


/* =======================================================
==================== LOGIN TITLE START ===================
======================================================= */
.login-title{
    text-align:center;
    margin-bottom:35px;
    position:relative;
    z-index:2;
}

.login-title h2{
    font-size:42px;
    font-weight:800;
    margin-bottom:10px;
}

.login-title p{
    color:rgba(255,255,255,0.7);
    font-size:15px;
}
/* =======================================================
===================== LOGIN TITLE END ====================
======================================================= */


/* =======================================================
====================== INPUTS START ======================
======================================================= */
.input-box{
    margin-bottom:22px;
    position:relative;
    z-index:2;
}

.input-box input{
    width:100%;
    padding:18px 20px;

    border:none;
    outline:none;

    border-radius:18px;

    background:rgba(255,255,255,0.09);

    border:1px solid rgba(255,255,255,0.08);

    color:white;
    font-size:15px;

    transition:0.4s;
}

.input-box input::placeholder{
    color:rgba(255,255,255,0.5);
}

.input-box input:focus{
    transform:scale(1.02);

    border:1px solid rgba(255,211,105,0.5);

    box-shadow:
    0 0 15px rgba(255,211,105,0.25);
}
/* =======================================================
======================= INPUTS END =======================
======================================================= */


/* =======================================================
====================== BUTTON START ======================
======================================================= */
.login-btn{
    width:100%;
    padding:18px;

    border:none;
    border-radius:18px;

    cursor:pointer;

    font-size:17px;
    font-weight:800;

    background:linear-gradient(
        135deg,
        #ffd369,
        #ffb703
    );

    color:#071739;

    transition:0.4s;

    position:relative;
    z-index:2;
}

.login-btn:hover{
    transform:translateY(-4px) scale(1.02);

    box-shadow:
    0 10px 25px rgba(255,211,105,0.35);
}
/* =======================================================
======================= BUTTON END =======================
======================================================= */


/* =======================================================
======================= LINKS START ======================
======================================================= */
.register-link{
    display:block;
    margin-top:22px;

    text-align:center;

    color:white;
    text-decoration:none;

    font-weight:600;

    position:relative;
    z-index:2;

    transition:0.3s;
}

.register-link:hover{
    color:#ffd369;
}
/* =======================================================
======================== LINKS END =======================
======================================================= */


/* =======================================================
====================== FOOTER START ======================
======================================================= */
.main-footer{
    width:100%;

    padding:35px 20px;

    text-align:center;

    backdrop-filter:blur(15px);

    background:rgba(255,255,255,0.04);

    border-top:1px solid rgba(255,255,255,0.08);
}

.social{
    margin-bottom:16px;
}

.social a{
    display:inline-flex;
    justify-content:center;
    align-items:center;

    width:45px;
    height:45px;

    margin:6px;

    border-radius:50%;

    background:rgba(255,255,255,0.08);

    color:white;

    text-decoration:none;

    font-weight:bold;

    transition:0.4s;
}

.social a:hover{
    transform:translateY(-6px) scale(1.08);

    background:#ffd369;
    color:#071739;

    box-shadow:
    0 8px 20px rgba(255,211,105,0.35);
}

.footer-text{
    color:rgba(255,255,255,0.7);
    font-size:14px;
}
/* =======================================================
======================= FOOTER END =======================
======================================================= */


/* =======================================================
==================== RESPONSIVE START ====================
======================================================= */

@media (max-width:900px){

    .main-header{
        padding:14px 18px;
    }

    .logo{
        height:46px;
    }

    .brand{
        font-size:22px;
    }

    .login-card{
        padding:35px 22px;
        border-radius:26px;
    }

    .login-title h2{
        font-size:32px;
    }

}

/* الهواتف */
@media (max-width:600px){

    /* تصغير الهيدر */
    .main-header{

        flex-direction:column;

        justify-content:center;

        gap:10px;

        padding:10px 15px;

    }

    .logo{
        height:38px;
    }

    .brand{
        font-size:18px;
    }

    .about-link{

        width:auto;

        padding:8px 18px;

        font-size:14px;

    }

    /* إبعاد المحتوى عن الهيدر */
    .main-section{

        min-height:auto;

        padding-top:170px;

        padding-bottom:80px;

        align-items:flex-start;

    }

    .login-card{

        width:100%;

        padding:28px 18px;

        border-radius:22px;

    }

    .login-title{

        margin-bottom:25px;

    }

    .login-title h2{

        font-size:26px;

    }

    .login-title p{

        font-size:13px;

    }

    .input-box input{

        padding:15px;

        font-size:14px;

    }

    .login-btn{

        padding:15px;

        font-size:15px;

    }

    /* الفوتر */
    .main-footer{

        margin-top:40px;

        padding:22px 15px;

    }

    .social a{

        width:38px;

        height:38px;

    }

}

/* الشاشات الصغيرة جداً */
@media (max-width:380px){

    .main-section{

        padding-top:155px;

    }

    .brand{

        font-size:16px;

    }

    .logo{

        height:34px;

    }

    .login-card{

        padding:22px 15px;

    }

    .login-title h2{

        font-size:22px;

    }

}

/* =======================================================
===================== RESPONSIVE END =====================
======================================================= */

@media (max-width:600px){

    /* اجعل القسم أعلى جميع العناصر */
    .main-section{

        position:relative;
        z-index:9999;

        padding-top:140px;
        padding-bottom:40px;

    }

    .login-card{

        position:relative;
        z-index:10000;

    }

    /* اجعل الهيدر والفوتر أسفل البطاقة */
    .main-header{

        z-index:100;

    }

    .main-footer{

        position:relative;
        z-index:100;

    }

}

</style>
</head>

<body>


<!-- =======================================================
======================= MAIN START ========================
======================================================= -->
<section class="main-section">

    <!-- LOGIN CARD START -->
    <div class="login-card">

        <div class="login-title">
            <h2>Welcome Back</h2>
            <p>
                Access your smart ticketing dashboard
            </p>
        </div>

        <div class="input-box">
            <input
                id="username"
                type="text"
                placeholder="Username"
            >
        </div>

        <div class="input-box">
            <input
                id="password"
                type="password"
                placeholder="Password"
            >
        </div>

        <button class="login-btn" onclick="login()">
            LOGIN
        </button>

    </div>
    <!-- LOGIN CARD END -->

</section>
<!-- =======================================================
======================== MAIN END =========================
======================================================= -->

<script>

const SUPABASE_URL =
"https://cqmhpvaaaduqbhjtyrgk.supabase.co/rest/v1/";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxbWhwdmFhYWR1cWJoanR5cmdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTA3OTUsImV4cCI6MjA5NDE4Njc5NX0.eqZ69jTSRFvPhjSVx2KZe9-3LSw0cw8uAQ6D06ZkQFg";


async function login(){

let username =
document.getElementById("username").value

let password =
document.getElementById("password").value

let res = await fetch(
SUPABASE_URL +
"users?username=eq."+username+
"&password_hash=eq."+password,
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer "+SUPABASE_KEY
}
})

let data = await res.json()

if(data.length > 0){

let user = data[0]

sessionStorage.setItem("user", JSON.stringify(user));

if(user.role === "employee"){
window.location = "rout.html"
}

else if(user.role === "it"){
window.location =
"engineer_dashboard.html"
}

else if(user.role === "admin"){
window.location =
"admin_dashboard.html"
}

else if(user.role === "admin_hr"){
window.location =
"hr_admin.html"
}

else if(user.role === "hr"){
window.location =
"hr_employee.html"
}

else{
alert("Unknown role")
}

}else{

alert("Wrong login data")

}

}

</script>

</body>
</html>
