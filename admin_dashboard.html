<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

<style>

/* =======================================================
====================== GLOBAL RESET ======================
======================================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    overflow-x:hidden;
}

/* =======================================================
====================== ADMIN PANEL =======================
======================================================= */

body{

    font-family:'Cairo',sans-serif;

    direction:rtl;

    background:
    radial-gradient(circle at top left,#123d91 0%,transparent 25%),
    radial-gradient(circle at bottom right,#0f3460 0%,transparent 30%),
    linear-gradient(135deg,#020814,#071739,#0f3460);

    color:white;

    min-height:100vh;

    padding-top:120px;
}

/* =======================================================
====================== ADMIN TITLE =======================
======================================================= */

.header{

    position:relative;

    width:100%;

    max-width:1400px;

    margin:30px auto;

    padding:24px 30px;

    border-radius:30px;

    text-align:center;

    font-size:32px;

    font-weight:800;

    color:white;

    overflow:hidden;

    backdrop-filter:blur(18px);

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.03)
    );

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 15px 40px rgba(0,0,0,0.25);
}

.header::before{

    content:"";

    position:absolute;

    top:0;
    right:0;

    width:100%;
    height:5px;

    background:
    linear-gradient(
        to left,
        #ffd369,
        #ffb703,
        transparent
    );
}

/* =======================================================
====================== MAIN HEADER START =================
======================================================= */

.main-header{

    width:100%;

    min-height:85px;

    padding:18px 25px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    position:fixed;

    top:0;
    right:0;

    gap:20px;

    z-index:2000;

    backdrop-filter:blur(18px);

    background:rgba(255,255,255,0.05);

    border-bottom:
    1px solid rgba(255,255,255,0.08);
}

.logo{
    height:55px;
    max-width:100%;
}

.brand{

    font-size:28px;

    font-weight:800;

    text-align:center;

    background:
    linear-gradient(to right,#fff,#ffd369);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.about-link{

    color:white;

    text-decoration:none;

    padding:12px 24px;

    border-radius:50px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,0.15),
        rgba(255,255,255,0.05)
    );

    border:
    1px solid rgba(255,255,255,0.12);

    transition:0.4s;

    font-weight:700;

    white-space:nowrap;
}

.about-link:hover{

    transform:translateY(-3px);

    background:
    linear-gradient(
        135deg,
        #ffd369,
        #ffb703
    );

    color:#071739;
}

/* =======================================================
======================= MAIN HEADER END ==================
======================================================= */


/* =======================================================
====================== CONTAINER =========================
======================================================= */

.container{

    width:100%;

    max-width:1400px;

    margin:auto;

    padding:
    0
    20px
    100px;
}

/* =======================================================
====================== CARD ==============================
======================================================= */

.card{

    position:relative;

    overflow:hidden;

    width:100%;

    backdrop-filter:blur(18px);

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.10),
        rgba(255,255,255,0.04)
    );

    border:
    1px solid rgba(255,255,255,0.10);

    border-radius:28px;

    padding:28px;

    margin-bottom:25px;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.25);

    transition:0.4s;
}

.card::before{

    content:"";

    position:absolute;

    top:0;
    right:0;

    width:100%;
    height:4px;

    background:
    linear-gradient(
        to left,
        #ffd369,
        #ffb703,
        transparent
    );
}

.card:hover{

    transform:translateY(-6px);

    box-shadow:
    0 20px 45px rgba(0,0,0,0.30);
}

/* =======================================================
====================== TITLES ============================
======================================================= */

.card h3{

    position:relative;

    display:inline-flex;

    align-items:center;

    justify-content:center;

    padding:
    16px
    34px;

    border-radius:999px;

    font-size:22px;

    font-weight:800;

    color:white;

    background:
    linear-gradient(
        135deg,
        rgba(255,211,105,0.18),
        rgba(255,255,255,0.08)
    );

    border:
    1px solid rgba(255,211,105,0.28);

    margin-bottom:25px;

    max-width:100%;

    text-align:center;

    flex-wrap:wrap;
}

/* =======================================================
====================== TICKETS ===========================
======================================================= */

.ticket{

    position:relative;

    overflow:hidden;

    width:100%;

    border-radius:24px;

    padding:20px;

    margin-bottom:18px;

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.03)
    );

    border:
    1px solid rgba(255,255,255,0.08);

    transition:0.35s;
}

.ticket::before{

    content:"";

    position:absolute;

    top:0;
    right:0;

    width:100%;
    height:4px;

    background:
    linear-gradient(
        to left,
        #ffd369,
        transparent
    );
}

.ticket:hover{

    transform:translateY(-4px);

    box-shadow:
    0 12px 30px rgba(0,0,0,0.20);
}

/* =======================================================
====================== TABLE WRAPPER =====================
======================================================= */

.table-wrapper{

    width:100%;

    overflow-x:auto;

    border-radius:22px;
}

/* =======================================================
====================== TABLE =============================
======================================================= */

table{

    width:100%;

    min-width:700px;

    border-collapse:collapse;

    margin-top:10px;

    border-radius:22px;

    overflow:hidden;
}

th{

    background:
    linear-gradient(
        135deg,
        rgba(255,211,105,0.25),
        rgba(255,183,3,0.15)
    );

    color:#ffd369;

    padding:18px;

    font-size:16px;

    font-weight:800;

    white-space:nowrap;
}

td{

    padding:16px;

    text-align:center;

    color:rgba(255,255,255,0.88);

    background:
    rgba(255,255,255,0.03);

    border-bottom:
    1px solid rgba(255,255,255,0.05);

    word-break:break-word;
}

/* =======================================================
====================== INPUTS ============================
======================================================= */

select,
input{

    width:100%;

    max-width:100%;

    padding:16px;

    margin-top:10px;

    margin-bottom:18px;

    border:none;

    outline:none;

    border-radius:18px;

    background:rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.08);

    color:white;

    font-size:15px;

    font-family:'Cairo',sans-serif;

    transition:0.35s;
}

input::placeholder{

    color:rgba(255,255,255,0.45);
}

option{

    color:black;
}

input:focus,
select:focus{

    transform:scale(1.01);

    border:
    1px solid rgba(255,211,105,0.45);

    box-shadow:
    0 0 18px rgba(255,211,105,0.18);
}

/* =======================================================
====================== BUTTONS ===========================
======================================================= */

button{

    padding:12px 18px;

    border:none;

    border-radius:16px;

    cursor:pointer;

    transition:0.35s;

    font-weight:700;

    font-family:'Cairo',sans-serif;

    max-width:100%;
}

button:hover{

    transform:translateY(-3px);
}

/* زر البحث */

.search-btn{

    width:100%;

    margin-top:10px;

    padding:16px;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #ffd369,
        #ffb703
    );

    color:#071739;

    font-size:16px;

    font-weight:800;
}

/* assign */

.assign{

    background:
    linear-gradient(
        135deg,
        #00c896,
        #00a97f
    );

    color:white;
}

/* update */

.update{

    background:
    linear-gradient(
        135deg,
        #ffb347,
        #ff9800
    );

    color:white;
}

/* role */

.role{

    background:
    linear-gradient(
        135deg,
        #4da3ff,
        #1976d2
    );

    color:white;
}

/* reason */

.reason{

    background:
    linear-gradient(
        135deg,
        #bb6cff,
        #8e44ad
    );

    color:white;
}

/* =======================================================
====================== REPORT BUTTON =====================
======================================================= */

.report-btn{

    width:100%;

    padding:18px;

    border-radius:20px;

    font-size:18px;

    background:
    linear-gradient(
        135deg,
        #ffd369,
        #ffb703
    );

    color:#071739;

    font-weight:800;
}

/* =======================================================
====================== FOOTER ============================
======================================================= */

.main-footer{

    margin-top:60px;

    width:100%;

    padding:35px 20px;

    text-align:center;

    backdrop-filter:blur(15px);

    background:rgba(255,255,255,0.04);

    border-top:
    1px solid rgba(255,255,255,0.08);
}

.social{
    margin-bottom:16px;
}

.social a{

    display:inline-flex;

    justify-content:center;

    align-items:center;

    width:45px;

    height:45px;

    margin:6px;

    border-radius:50%;

    background:rgba(255,255,255,0.08);

    color:white;

    text-decoration:none;

    font-weight:bold;

    transition:0.4s;
}

.social a:hover{

    transform:translateY(-6px);

    background:#ffd369;

    color:#071739;
}

.footer-text{

    color:rgba(255,255,255,0.7);

    font-size:14px;
}

/* =======================================================
====================== MOBILE ============================
======================================================= */

@media(max-width:768px){

    body{
        padding-top:150px;
    }

    .main-header{

        flex-direction:column;

        justify-content:center;

        text-align:center;

        padding:15px;
    }

    .brand{
        font-size:22px;
    }

    .container{

        padding:
        0
        12px
        80px;
    }

    .header{

        font-size:24px;

        padding:20px;

        border-radius:24px;
    }

    .card{

        padding:18px;

        border-radius:22px;
    }

    .card h3{

        width:100%;

        font-size:18px;

        padding:14px 18px;
    }

    .ticket{

        padding:16px;
    }

    table{
        min-width:600px;
    }

    th,
    td{

        padding:12px;

        font-size:14px;
    }

    button{

        width:100%;
    }
}

/* =======================================================
====================== SMALL MOBILE ======================
======================================================= */

@media(max-width:480px){

    body{
        padding-top:170px;
    }

    .brand{
        font-size:19px;
    }

    .header{
        font-size:20px;
    }

    .card{
        padding:15px;
    }

    .ticket{
        padding:14px;
    }

    input,
    select{

        padding:14px;

        font-size:14px;
    }

    .search-btn,
    .report-btn{

        font-size:15px;
    }
}
/* =======================================================
====================== TICKETS GRID ======================
======================================================= */

.tickets-container{

    display:grid;

    grid-template-columns:1fr;

    gap:20px;
}

/* عند الشاشات الواسعة تظهر بطاقتين */

@media(min-width:900px){

    .tickets-container{

        grid-template-columns:1fr 1fr;
    }
}

/* =======================================================
====================== TICKET DESIGN =====================
======================================================= */

.ticket{

    position:relative;

    overflow:hidden;

    border-radius:26px;

    padding:20px;

    margin-bottom:0;

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.09),
        rgba(255,255,255,0.03)
    );

    border:
    1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    transition:0.4s;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.18);
}

.ticket:hover{

    transform:translateY(-6px);

    box-shadow:
    0 18px 40px rgba(0,0,0,0.28);
}

.ticket::before{

    content:"";

    position:absolute;

    top:0;
    right:0;

    width:100%;
    height:4px;

    background:
    linear-gradient(
        to left,
        #ffd369,
        transparent
    );
}

/* =======================================================
====================== TOP SECTION =======================
======================================================= */

.ticket-top{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:12px;

    margin-bottom:18px;

    flex-wrap:wrap;
}

.ticket-title{

    font-size:20px;

    font-weight:800;

    color:white;
}

/* =======================================================
====================== STATUS ============================
======================================================= */

.ticket-status{

    padding:8px 16px;

    border-radius:50px;

    font-size:13px;

    font-weight:800;
}

.status-open{

    background:
    linear-gradient(
        135deg,
        #09810f,
        #095f15
    );

    color:white;
}

.status-progress{

    background:
    linear-gradient(
        135deg,
        #ffb347,
        #ff9800
    );

    color:white;
}

.status-closed{

    background:
    linear-gradient(
        135deg,
        #661010,
        #3a1010
    );

    color:white;
}

/* =======================================================
====================== BODY ==============================
======================================================= */

.ticket-body{

    display:flex;

    flex-direction:column;

    gap:12px;
}

.ticket-item{

    display:flex;

    align-items:flex-start;

    gap:10px;

    padding:12px 14px;

    border-radius:16px;

    background:
    rgba(255,255,255,0.04);

    border:
    1px solid rgba(255,255,255,0.05);

    flex-wrap:wrap;
}

.label{

    color:#ffd369;

    font-weight:800;

    min-width:130px;
}

.value{

    color:rgba(255,255,255,0.9);

    flex:1;

    word-break:break-word;
}

/* =======================================================
====================== ACTIONS ===========================
======================================================= */

.ticket-actions{

    margin-top:18px;

    display:flex;

    gap:10px;

    flex-wrap:wrap;
}

.ticket-actions button{

    min-width:160px;
}

/* =======================================================
====================== MOBILE ============================
======================================================= */

@media(max-width:768px){

    .ticket{

        padding:16px;
    }

    .ticket-title{

        font-size:18px;
    }

    .ticket-item{

        flex-direction:column;
    }

    .label{

        min-width:100%;
    }

    .ticket-actions button{

        width:100%;
    }
}

</style>

</head>

<script>

const SUPABASE_URL="https://cqmhpvaaaduqbhjtyrgk.supabase.co/rest/v1/"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxbWhwdmFhYWR1cWJoanR5cmdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTA3OTUsImV4cCI6MjA5NDE4Njc5NX0.eqZ69jTSRFvPhjSVx2KZe9-3LSw0cw8uAQ6D06ZkQFg"

function logout() {

    sessionStorage.clear();

    window.location.replace("index.html");

}


let engineers=[]

async function fetchAPI(url){

let res=await fetch(url,{
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}
})

return await res.json()

}

async function loadEngineers(){

engineers=await fetchAPI(
SUPABASE_URL+"users?role=eq.it"
)

let html="<tr><th>الاسم</th><th>الهاتف</th><th>الكلية</th></tr>"

for(let e of engineers){

html+=`<tr>
<td>${e.name}</td>
<td>${e.phone||""}</td>
<td>${e.faculty||""}</td>
</tr>`

}

document.getElementById("engineersTable").innerHTML=html

let opt="<option value=''>كل المهندسين</option>"

for(let e of engineers){
opt+=`<option value="${e.id}">${e.name}</option>`
}

engineerReport.innerHTML=opt
engineerStats.innerHTML=opt

}

async function loadUsers(){

let name=searchName.value
let phone=searchPhone.value
let faculty=facultyFilter.value

let url=SUPABASE_URL+"users?"
let filters=[]

if(name)filters.push("name=ilike.*"+name+"*")
if(phone)filters.push("phone=ilike.*"+phone+"*")
if(faculty)filters.push("faculty=eq."+faculty)

url+=filters.join("&")

let data=await fetchAPI(url)

let html="<table>"

html+="<tr><th>الاسم</th><th>الهاتف</th><th>الكلية</th><th>الصلاحية</th></tr>"

for(let u of data){

html+=`

<tr>

<td>${u.name}</td>
<td>${u.phone||""}</td>

<td>

<select onchange="changeFaculty('${u.id}',this.value)">

<option value="pharmacy" ${u.faculty=="pharmacy"?"selected":""}>pharmacy</option>
<option value="physical_therapy" ${u.faculty=="physical_therapy"?"selected":""}>physical therapy</option>
<option value="dentistry" ${u.faculty=="dentistry"?"selected":""}>dentistry</option>
<option value="computer_science" ${u.faculty=="computer_science"?"selected":""}>computer science</option>
<option value="management" ${u.faculty=="management"?"selected":""}>management</option>

</select>

</td>

<td>

<select onchange="changeRole('${u.id}',this.value)">

<option value="employee" ${u.role=="employee"?"selected":""}>employee</option>
<option value="it" ${u.role=="it"?"selected":""}>it</option>
<option value="admin" ${u.role=="admin"?"selected":""}>admin</option>

</select>

</td>

</tr>

`

}

html+="</table>"

users.innerHTML=html

}

async function changeRole(id,role){

await fetch(SUPABASE_URL+"users?id=eq."+id,{
method:"PATCH",
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({role:role})
})

alert("تم تحديث الصلاحية")

}

async function changeFaculty(id,faculty){

await fetch(SUPABASE_URL+"users?id=eq."+id,{
method:"PATCH",
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({faculty:faculty})
})

alert("تم تحديث الكلية")

}

function engineerSelect(ticketId){

let html=`<select onchange="assignEngineer(${ticketId},this.value)">`

for(let e of engineers){
html+=`<option value="${e.id}">${e.name}</option>`
}

html+="</select>"

return html

}

async function assignEngineer(ticket,engineer){

await fetch(SUPABASE_URL+"tickets?id=eq."+ticket,{
method:"PATCH",
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
assigned_to:engineer,
status:"in_progress"
})
})

alert("تم تحويل التيكت")

loadTickets()

}

async function addReason(ticket){

let reason=prompt("اكتب السبب الفني")

if(!reason)return

let old=await fetchAPI(
SUPABASE_URL+"ticket_solution?ticket_id=eq."+ticket
)

let text=reason

if(old.length){

text=reason+" - "+old[0].solution_text

await fetch(SUPABASE_URL+"ticket_solution?ticket_id=eq."+ticket,{
method:"PATCH",
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
solution_text:text
})
})

}else{

await fetch(SUPABASE_URL+"ticket_solution",{
method:"POST",
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
ticket_id:ticket,
solution_text:text
})
})

}

alert("تم اضافة السبب الفني")

}

async function loadTickets(){

let data=await fetchAPI(
SUPABASE_URL+
"tickets?select=*,creator:users!tickets_created_by_fkey(name,phone),engineer:users!tickets_assigned_to_fkey(name),solution:ticket_solution(solution_text)"
)

let open=""
let progress=""
let closed=""

for(let t of data){

let statusClass=""
let statusText=""

if(t.status=="open"){
    statusClass="status-open"
    statusText="مفتوحة"
}
else if(t.status=="in_progress"){
    statusClass="status-progress"
    statusText="قيد التنفيذ"
}
else if(t.status=="closed"){
    statusClass="status-closed"
    statusText="مغلقة"
}

let block = `

<div class="ticket">

<div class="ticket-top">

<div class="ticket-title">
🎫 ${t.title}
</div>

<div class="ticket-status ${statusClass}">
${statusText}
</div>

</div>

<div class="ticket-body">

<div class="ticket-item">
<span class="label">📝 الوصف:</span>
<span class="value">${t.description || "لا يوجد وصف"}</span>
</div>

<div class="ticket-item">
<span class="label">📍 اللوكيشن:</span>
<span class="value">${t.location || "غير محدد"}</span>
</div>

<div class="ticket-item">
<span class="label">👤 الموظف:</span>
<span class="value">${t.creator?.name || "غير معروف"}</span>
</div>

<div class="ticket-item">
<span class="label">📞 رقم الهاتف:</span>
<span class="value">${t.creator?.phone || "غير متوفر"}</span>
</div>

<div class="ticket-item">
<span class="label">🛠 المهندس:</span>
<span class="value">${t.engineer?.name || "غير معين"}</span>
</div>

<div class="ticket-item">
<span class="label">⚙ السبب الفني:</span>
<span class="value">${t.solution?.solution_text || "لم يتم إضافة سبب فني"}</span>
</div>

</div>

<div class="ticket-actions">
`

if(t.status=="open"){

block += `
${engineerSelect(t.id)}
`

open += block + `</div></div>`

}

else if(t.status=="in_progress"){

block += `
<button class="reason" onclick="addReason(${t.id})">
➕ إضافة سبب فني
</button>
`

progress += block + `</div></div>`

}

else if(t.status=="closed"){

closed += block + `</div></div>`

}

}

openTickets.innerHTML=open
progressTickets.innerHTML=progress
closedTickets.innerHTML=closed

}

async function generatePDF(){

let tickets=await fetchAPI(
SUPABASE_URL+
"tickets?select=*,creator:users!tickets_created_by_fkey(name,phone),engineer:users!tickets_assigned_to_fkey(name)"
)

let engineers=await fetchAPI(
SUPABASE_URL+"users?role=eq.it"
)

let content=[]

for(let e of engineers){

let list=tickets.filter(t=>t.assigned_to==e.id)

if(!list.length)continue

content.push({text:"بيانات المهندس",style:"header"})

content.push({
table:{
body:[
["ID","الاسم","الكلية","الهاتف"],
[e.id,e.name,e.faculty||"",e.phone||""]
]
}
})

let rows=[["id","العنوان","الوصف","الموظف","الهاتف","الحالة","المهندس"]]

for(let t of list){

rows.push([
t.id,
t.title,
t.description||"",
t.creator?.name||"",
t.creator?.phone||"",
t.status,
e.name
])

}

content.push({table:{body:rows}})

}

let doc={content:content}

pdfMake.createPdf(doc).download("report.pdf")

}
