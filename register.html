<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | SGU Ticketing</title>

<!-- =======================================================
====================== GOOGLE FONT ========================
======================================================= -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

/* =======================================================
======================== ROOT START ======================
======================================================= */
:root{

    --primary:#071739;
    --secondary:#0f3460;
    --gold:#ffd369;

    --white:#ffffff;

    --glass:rgba(255,255,255,0.10);
    --border:rgba(255,255,255,0.15);

}
/* =======================================================
========================= ROOT END =======================
======================================================= */


/* =======================================================
======================= GLOBAL START =====================
======================================================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Cairo',sans-serif;

    min-height:100vh;

    overflow-x:hidden;

    background:
    radial-gradient(circle at top left,#123d91 0%,transparent 25%),
    radial-gradient(circle at bottom right,#0f3460 0%,transparent 30%),
    linear-gradient(135deg,#020814,#071739,#0f3460);

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px 20px;

    position:relative;

    color:white;
}

/* خلفيات احترافية متحركة */
body::before{
    content:"";
    position:fixed;

    width:500px;
    height:500px;

    background:rgba(255,211,105,0.10);

    border-radius:50%;

    top:-150px;
    left:-150px;

    filter:blur(120px);

    animation:moveGlow1 10s infinite alternate;
}

body::after{
    content:"";
    position:fixed;

    width:450px;
    height:450px;

    background:rgba(15,52,96,0.45);

    border-radius:50%;

    bottom:-150px;
    right:-150px;

    filter:blur(120px);

    animation:moveGlow2 12s infinite alternate;
}

@keyframes moveGlow1{

    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(90px,50px);
    }

}

@keyframes moveGlow2{

    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(-80px,-40px);
    }

}
/* =======================================================
======================== GLOBAL END ======================
======================================================= */


/* =======================================================
======================== CARD START ======================
======================================================= */
.register-card{

    width:100%;
    max-width:1000px;

    display:grid;
    grid-template-columns:1fr 1fr;

    border-radius:35px;

    overflow:hidden;

    backdrop-filter:blur(18px);

    background:rgba(255,255,255,0.07);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 15px 40px rgba(0,0,0,0.35);

    animation:showCard 1s ease;
}

@keyframes showCard{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}
/* =======================================================
========================= CARD END =======================
======================================================= */


/* =======================================================
======================== LEFT SIDE START =================
======================================================= */
.left-side{

    padding:60px 50px;

    position:relative;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,0.04),
        rgba(255,255,255,0.02)
    );

    border-left:1px solid rgba(255,255,255,0.08);
}

.logo{
    width:90px;
    margin-bottom:25px;
}

.left-side h1{

    font-size:42px;
    line-height:1.3;

    margin-bottom:20px;

    font-weight:800;
}

.left-side p{

    color:rgba(255,255,255,0.70);

    line-height:2;

    font-size:15px;
}

.glow-circle{

    position:absolute;

    width:220px;
    height:220px;

    border-radius:50%;

    background:rgba(255,211,105,0.12);

    filter:blur(60px);

    bottom:-70px;
    left:-70px;
}
/* =======================================================
========================= LEFT SIDE END ==================
======================================================= */


/* =======================================================
======================== RIGHT SIDE START ================
======================================================= */
.right-side{

    padding:55px 45px;

    position:relative;
}

.form-title{

    margin-bottom:35px;
}

.form-title h2{

    font-size:38px;
    font-weight:800;

    margin-bottom:10px;
}

.form-title p{

    color:rgba(255,255,255,0.65);

    font-size:14px;
}
/* =======================================================
========================= RIGHT SIDE END =================
======================================================= */


/* =======================================================
======================== FORM START ======================
======================================================= */
.form-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;
}

.full-width{
    grid-column:1 / -1;
}

.input-box{

    position:relative;
}

.input-box input,
.input-box select{

    width:100%;

    padding:17px 18px;

    border:none;
    outline:none;

    border-radius:18px;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.08);

    color:white;

    font-size:14px;

    transition:0.35s;
}

.input-box input::placeholder{
    color:rgba(255,255,255,0.45);
}

.input-box select{
    color:white;
}

.input-box option{
    color:black;
}

.input-box input:focus,
.input-box select:focus{

    transform:scale(1.02);

    border:1px solid rgba(255,211,105,0.5);

    box-shadow:
    0 0 18px rgba(255,211,105,0.20);
}
/* =======================================================
========================= FORM END =======================
======================================================= */


/* =======================================================
======================== BUTTON START ====================
======================================================= */
.register-btn{

    width:100%;

    padding:18px;

    margin-top:25px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #ffd369,
        #ffb703
    );

    color:#071739;

    font-size:17px;
    font-weight:800;

    cursor:pointer;

    transition:0.4s;
}

.register-btn:hover{

    transform:translateY(-4px);

    box-shadow:
    0 12px 25px rgba(255,211,105,0.30);
}
/* =======================================================
========================= BUTTON END =====================
======================================================= */


/* =======================================================
======================== LOGIN LINK START ================
======================================================= */
.login-link{

    display:block;

    text-align:center;

    margin-top:18px;

    text-decoration:none;

    color:white;

    font-weight:600;

    transition:0.3s;
}

.login-link:hover{
    color:#ffd369;
}
/* =======================================================
========================= LOGIN LINK END =================
======================================================= */


/* =======================================================
======================== RESPONSIVE START ================
======================================================= */
@media(max-width:950px){

    .register-card{

        grid-template-columns:1fr;
    }

    .left-side{

        border-left:none;

        border-bottom:1px solid rgba(255,255,255,0.08);
    }

}

@media(max-width:700px){

    body{
        padding:20px 15px;
    }

    .left-side,
    .right-side{

        padding:35px 25px;
    }

    .left-side h1{
        font-size:32px;
    }

    .form-title h2{
        font-size:30px;
    }

    .form-grid{

        grid-template-columns:1fr;
    }

}

@media(max-width:450px){

    .register-card{

        border-radius:24px;
    }

    .left-side h1{
        font-size:26px;
    }

    .form-title h2{
        font-size:25px;
    }

    .input-box input,
    .input-box select{

        padding:15px;
    }

}
/* =======================================================
========================= RESPONSIVE END =================
======================================================= */

</style>

</head>

<body>

<!-- =======================================================
====================== CARD START ========================
======================================================= -->
<div class="register-card">


    <!-- =======================================================
    ====================== LEFT SIDE START ===================
    ======================================================= -->
    <div class="left-side">

        <img src="photo/logo.png" class="logo">

        <h1>
            Join The Future Of
            Smart Ticketing
        </h1>

        <p>
            أنشئ حسابك الآن للوصول إلى نظام التذاكر الذكي
            وإدارة الطلبات والمشكلات التقنية بسهولة واحترافية
            عبر منصة حديثة متوافقة مع جميع الأجهزة.
        </p>

        <div class="glow-circle"></div>

    </div>
    <!-- =======================================================
    ======================= LEFT SIDE END ====================
    ======================================================= -->


    <!-- =======================================================
    ===================== RIGHT SIDE START ===================
    ======================================================= -->
    <div class="right-side">

        <div class="form-title">

            <h2>Create Account</h2>

            <p>
                Fill all required information
            </p>

        </div>


        <!-- FORM START -->
        <div class="form-grid">

            <div class="input-box">
                <input
                    id="name"
                    type="text"
                    placeholder="Full Name"
                >
            </div>

            <div class="input-box">
                <input
                    id="username"
                    type="text"
                    placeholder="Username"
                >
            </div>

            <div class="input-box">
                <input
                    id="password"
                    type="password"
                    placeholder="Password"
                >
            </div>

            <div class="input-box">
                <input
                    id="phone"
                    type="text"
                    placeholder="Phone Number"
                >
            </div>

            <div class="input-box">
                <select id="faculty">

                    <option value="pharmacy">
                        صيدلة
                    </option>

                    <option value="physical_therapy">
                        علاج طبيعي
                    </option>

                    <option value="dentistry">
                        أسنان
                    </option>

                    <option value="computer_science">
                        حاسبات
                    </option>

                    <option value="management">
                        إدارة
                    </option>

                </select>
            </div>

            <div class="input-box">
                <input
                    id="job"
                    type="text"
                    placeholder="Job Title"
                >
            </div>

            <div class="input-box full-width">
                <select id="gender">

                    <option value="male">
                        ذكر
                    </option>

                    <option value="female">
                        أنثى
                    </option>

                </select>
            </div>

        </div>
        <!-- FORM END -->


        <!-- BUTTON START -->
        <button
            class="register-btn"
            onclick="register()"
        >
            CREATE ACCOUNT
        </button>
        <!-- BUTTON END -->


        <!-- LOGIN LINK START -->
        <a href="index.html" class="login-link">
            Already have an account ? Login
        </a>
        <!-- LOGIN LINK END -->

    </div>
    <!-- =======================================================
    ====================== RIGHT SIDE END =====================
    ======================================================= -->


</div>
<!-- =======================================================
======================= CARD END ==========================
======================================================= -->

</body>
</html>
